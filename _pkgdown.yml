url: https://ghoziankarami.github.io/geosR/
template:
  bootstrap: 5
  bslib:
    bg: "#ffffff"
    fg: "#0f172a"
    primary: "#0f172a"
    base_font: { google: "Inter" }
    heading_font: { google: "Inter" }
    code_font: { google: "JetBrains Mono" }
navbar:
  bg: white
  type: light
  structure:
    left: [intro, reference, articles, news]
    right: [orebit, github]
  components:
    orebit:
      text: "Orebit Project"
      href: "https://showcase.orebit.id"
    github:
      icon: "fab fa-github"
      href: "https://github.com/ghoziankarami/geosR"
      aria-label: "GitHub"

reference:
  - title: "Resource Calculation & Evaluation"
    desc: "Core tools for computing block volumes, applying density parameters, evaluating recovery factors against realization, and plotting resource maps."
    contents:
      - calc_res
      - ev_rest
      - plot_res
  - title: "Geostatistical Spatial Modeling"
    desc: "Wrappers around gstat to streamline generating experimental variograms, fitting spherical models, and executing Ordinary Kriging."
    contents:
      - fit_var
      - est_krige
  - title: "Statistical Extrapolation & Transformation"
    desc: "Data preparation helpers for transforming gaussian data, cleaning outliers, and calculating normal scores."
    contents:
      - backtr
      - no_outlier
      - nscore
